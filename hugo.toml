baseURL = "https://go-learning-blog.pages.dev/"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "Go 与算法手记"
hasCJKLanguage = true
enableRobotsTXT = true
summaryLength = 120

[pagination]
pagerSize = 9

[permalinks]
posts = "/posts/:slug/"
snippets = "/snippets/:slug/"
algorithms = "/algorithms/"
go-modules = "/go-modules/"
roadmap = "/roadmap/"

[taxonomies]
tag = "tags"
series = "series"
difficulty = "difficulties"

[outputs]
home = ["HTML", "RSS", "JSON"]
section = ["HTML", "RSS"]
taxonomy = ["HTML", "RSS"]
term = ["HTML", "RSS"]

[related]
includeNewer = true
threshold = 20

  [[related.indices]]
  name = "series"
  weight = 120

  [[related.indices]]
  name = "tags"
  weight = 100

  [[related.indices]]
  name = "difficulties"
  weight = 70

  [[related.indices]]
  name = "section"
  weight = 40

[markup]
  [markup.highlight]
  noClasses = false
  lineNos = true
  lineNumbersInTable = false
  tabWidth = 2

  [markup.goldmark]
    [markup.goldmark.renderer]
    unsafe = false

  [markup.tableOfContents]
  startLevel = 2
  endLevel = 4
  ordered = false

[params]
description = "记录 Go 学习、算法题解、工程实践、性能优化和踩坑复盘。"
author = "GoJourney"
siteIntro = "把 Go 工程学习与算法训练沉淀成可复用的知识库。"
sitePitch = "这里主要记录 Go 基础、并发模型、Web 开发、工程化实践，以及数组、树、图、动态规划等算法题解与刷题复盘。"
email = "orb_wy_yzz@163.com"
github = "https://github.com/maxfeizi04-cloud"
dateFormat = "2006-01-02"
mainSections = ["posts", "snippets"]

  [params.giscus]
  enabled = true
  repo = "maxfeizi04-cloud/go-learning-blog"
  repoId = "R_kgDOR33oYw"
  category = "Announcements"
  categoryId = ""
  mapping = "pathname"
  strict = "0"
  reactionsEnabled = "1"
  emitMetadata = "0"
  inputPosition = "top"
  theme = "light"
  lang = "zh-CN"


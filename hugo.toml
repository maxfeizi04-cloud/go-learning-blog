baseURL = "https://go-learning-blog.pages.dev/"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "Go 学习手记"
hasCJKLanguage = true
enableRobotsTXT = true
summaryLength = 120

[pagination]
pagerSize = 9

[permalinks]
posts = "/posts/:slug/"
snippets = "/snippets/:slug/"

[taxonomies]
tag = "tags"
series = "series"

[outputs]
home = ["HTML", "RSS", "JSON"]
section = ["HTML", "RSS"]
taxonomy = ["HTML", "RSS"]
term = ["HTML", "RSS"]

[markup]
  [markup.highlight]
  noClasses = false
  lineNos = true
  lineNumbersInTable = false
  tabWidth = 2

  [markup.goldmark]
    [markup.goldmark.renderer]
    unsafe = false

  [markup.tableOfContents]
  startLevel = 2
  endLevel = 4
  ordered = false

[params]
description = "记录 Go 学习、工程实践、性能优化和踩坑复盘。"
author = "Feizi"
siteIntro = "把 Go 学习过程沉淀成可复用的知识库。"
sitePitch = "这里主要记录 Go 基础、并发模型、Web 开发、工程化实践和真实踩坑。"
email = "orb_wy_yzz@163.com"
github = "https://github.com/maxfeizi04-cloud"
dateFormat = "2006-01-02"
mainSections = ["posts", "snippets"]

  [params.giscus]
  enabled = false
  repo = ""
  repoId = ""
  category = ""
  categoryId = ""
  mapping = "pathname"
  strict = "0"
  reactionsEnabled = "1"
  emitMetadata = "0"
  inputPosition = "top"
  theme = "light"
  lang = "zh-CN"

[[menu.main]]
name = "首页"
url = "/"
weight = 1

[[menu.main]]
name = "学习记录"
url = "/posts/"
weight = 2

[[menu.main]]
name = "代码片段"
url = "/snippets/"
weight = 3

[[menu.main]]
name = "标签"
url = "/tags/"
weight = 4

[[menu.main]]
name = "关于"
url = "/about/"
weight = 5
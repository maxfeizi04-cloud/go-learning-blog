<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body
    data-search-index-url="{{ "index.json" | relURL }}"
    data-search-page-url="{{ "search/" | relURL }}"
  >
    <div class="page-frame">
      {{ partial "header.html" . }}
      <main class="site-main">
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "footer.html" . }}
    </div>
    {{ partial "scripts.html" . }}
  </body>
</html>

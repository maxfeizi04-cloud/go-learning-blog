name: Site Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  site-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.2'
          extended: true

      - name: Verify Hugo version
        run: hugo version

      - name: Build site
        run: hugo --gc --minify --cleanDestinationDir

      - name: Run preflight script
        shell: pwsh
        run: ./scripts/check-site.ps1
name: Site Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  site-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.2'
          extended: true

      - name: Verify Hugo version
        run: hugo version

      - name: Validate front matter
        shell: pwsh
        run: ./scripts/validate-frontmatter.ps1

      - name: Build site
        run: hugo --gc --minify --cleanDestinationDir

      - name: Run preflight script
        shell: pwsh
        run: ./scripts/check-site.ps1

      - name: Run search UI self-check
        shell: pwsh
        run: ./scripts/check-search-ui.ps1

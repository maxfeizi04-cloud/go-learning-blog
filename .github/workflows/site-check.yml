name: Site Check and Deploy

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  site-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.2'
          extended: true

      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.hugo_cache
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Verify Hugo version
        run: hugo version

      - name: Validate front matter
        shell: pwsh
        run: ./scripts/validate-frontmatter.ps1

      - name: Build site
        run: hugo --gc --minify --cleanDestinationDir

      - name: Run preflight script
        shell: pwsh
        run: ./scripts/check-site.ps1

      - name: Run search UI self-check
        shell: pwsh
        run: ./scripts/check-search-ui.ps1

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1.10.0
        with:
          args: --verbose --no-progress './public/**/*.html'
          fail: true

  deploy:
    needs: site-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.2'
          extended: true

      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.hugo_cache
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Build site for production
        run: hugo --gc --minify --cleanDestinationDir

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: go-learning-blog
          directory: ./public
          branch: main
